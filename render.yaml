services:
  - type: web
    name: learninghub
    env: python
    buildCommand: "bash build.sh"
    startCommand: "gunicorn learninghub.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: learninghub-db
          property: connectionString

databases:
  - name: learninghub-db
